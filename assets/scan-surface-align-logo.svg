<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">Scan Surface Align Logo</title>
  <desc id="desc">Geometric logo for the Scan Surface Align Blender addon by 3dpotok.ru</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="960" height="320" rx="32" fill="url(#bg)"/>

  <g transform="translate(60 40)">
    <rect x="0" y="0" width="240" height="240" rx="28" fill="#0b1120" stroke="#1f2937" stroke-width="4"/>

    <g stroke="#1f2937" stroke-width="2" opacity="0.75">
      <line x1="40" y1="40" x2="200" y2="40"/>
      <line x1="40" y1="80" x2="200" y2="80"/>
      <line x1="40" y1="120" x2="200" y2="120"/>
      <line x1="40" y1="160" x2="200" y2="160"/>
      <line x1="40" y1="200" x2="200" y2="200"/>
      <line x1="40" y1="40" x2="40" y2="200"/>
      <line x1="80" y1="40" x2="80" y2="200"/>
      <line x1="120" y1="40" x2="120" y2="200"/>
      <line x1="160" y1="40" x2="160" y2="200"/>
      <line x1="200" y1="40" x2="200" y2="200"/>
    </g>

    <g>
      <path d="M70 154 L126 94 L194 118 L138 178 Z" fill="none" stroke="url(#accent)" stroke-width="12" stroke-linejoin="round"/>
      <path d="M126 94 L126 54" stroke="#38bdf8" stroke-width="10" stroke-linecap="round"/>
      <path d="M126 94 L210 94" stroke="#f97316" stroke-width="10" stroke-linecap="round"/>
      <path d="M126 94 L92 192" stroke="url(#accent2)" stroke-width="10" stroke-linecap="round"/>
      <circle cx="126" cy="94" r="12" fill="#ffffff"/>
      <circle cx="70" cy="154" r="8" fill="#38bdf8"/>
      <circle cx="194" cy="118" r="8" fill="#f97316"/>
      <circle cx="138" cy="178" r="8" fill="#22c55e"/>
    </g>
  </g>

  <g transform="translate(340 80)">
    <text x="0" y="62" fill="#f8fafc" font-size="54" font-family="Segoe UI, Arial, sans-serif" font-weight="700" letter-spacing="1">Scan Surface Align</text>
    <text x="0" y="114" fill="#94a3b8" font-size="24" font-family="Segoe UI, Arial, sans-serif">Blender addon for scan orientation and world-axis alignment</text>
    <rect x="0" y="148" width="186" height="40" rx="20" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="24" y="174" fill="#38bdf8" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">3dpotok.ru</text>
    <rect x="204" y="148" width="188" height="40" rx="20" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="228" y="174" fill="#f97316" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">@standalone2k</text>
  </g>
</svg>
